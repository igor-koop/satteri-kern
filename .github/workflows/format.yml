name: Format

on:
  workflow_call:

permissions:
  contents: read

jobs:
  oxfmt:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run oxfmt
        run: npm run check:fmt
