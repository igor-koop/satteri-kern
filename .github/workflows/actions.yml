name: Actions

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  format:
    uses: ./.github/workflows/format.yml

  lint:
    uses: ./.github/workflows/lint.yml

  type:
    uses: ./.github/workflows/type.yml

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
